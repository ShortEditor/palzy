<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Palzy — the social feed built for your college crowd. Post, like, comment and chat with your batchmates." />
    <meta name="theme-color" content="#a078ff" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Fonts: preconnect first, then async load to unblock FCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Firebase + Cloudinary DNS warm-up -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <title>Palzy</title>

    <!-- ── Content Protection ────────────────────────────────────────
         Disables right-click, image drag-to-save, and iOS long-press
         download sheet. Does NOT block normal page interaction.
    ─────────────────────────────────────────────────────────────── -->
    <script>
      (function () {
        // Allow on localhost for dev convenience
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return;

        // Block right-click context menu
        document.addEventListener('contextmenu', function (e) {
          if (e.target.tagName === 'IMG' ||
              e.target.tagName === 'VIDEO' ||
              e.target.closest('.reel-card, .post-image, .post-card')) {
            e.preventDefault();
          }
        }, true);

        // Block drag-start on media (drag-to-save trick)
        document.addEventListener('dragstart', function (e) {
          if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
            e.preventDefault();
          }
        }, true);

        // Block keyboard shortcuts for saving (Ctrl+S / Cmd+S)
        document.addEventListener('keydown', function (e) {
          if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
