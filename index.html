<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Palzy — the social feed built for your college crowd. Post, like, comment and chat with your batchmates." />
    <meta name="theme-color" content="#a078ff" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Geist:wght@400;500;600;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Lora:ital,wght@0,400..700;1,400..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet" />
    <title>Palzy</title>

    <!-- ── Content Protection ────────────────────────────────────────
         Disables right-click, image drag-to-save, and iOS long-press
         download sheet. Does NOT block normal page interaction.
    ─────────────────────────────────────────────────────────────── -->
    <script>
      (function () {
        // Allow on localhost for dev convenience
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return;

        // Block right-click context menu
        document.addEventListener('contextmenu', function (e) {
          if (e.target.tagName === 'IMG' ||
              e.target.tagName === 'VIDEO' ||
              e.target.closest('.reel-card, .post-image, .post-card')) {
            e.preventDefault();
          }
        }, true);

        // Block drag-start on media (drag-to-save trick)
        document.addEventListener('dragstart', function (e) {
          if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
            e.preventDefault();
          }
        }, true);

        // Block keyboard shortcuts for saving (Ctrl+S / Cmd+S)
        document.addEventListener('keydown', function (e) {
          if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
